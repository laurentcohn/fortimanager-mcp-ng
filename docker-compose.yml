services:
  fortimanager-mcp-ng:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fortimanager-mcp-ng
    env_file:
      - .env
    ports:
      - "${MCP_SERVER_PORT:-8000}:8000"
    environment:
      MCP_SERVER_HOST: 0.0.0.0
      MCP_SERVER_PORT: 8000
      MCP_SERVER_MODE: http
      DOCKER_CONTAINER: "1"
      LOG_FILE: /app/logs/fortimanager-mcp-ng.log
      FMG_ALLOWED_OUTPUT_DIRS: /app/output
    volumes:
      - ./logs:/app/logs
      - ./output:/app/output
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - fortimanager-mcp-ng

networks:
  fortimanager-mcp-ng:
    driver: bridge
